<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui,微软雅黑,sans-serif;background:#f0f4f8;color:#333;}
        .wrap{max-width:700px;margin:60px auto;padding:0 20px;}
        .box{background:#fff;border-radius:20px;padding:40px;box-shadow:0 4px 20px #00000010;text-align:center;}
        .avatar{width:130px;height:130px;border-radius:50%;object-fit:cover;border:4px solid #2563eb;margin:0 auto 20px;}
        h1{font-size:26px;color:#111;margin-bottom:8px;}
        .sub{color:#666;margin-bottom:30px;}
        .tit{font-size:18px;color:#2563eb;margin:35px 0 15px;}
        p{line-height:1.8;color:#444;}
        .tag{display:inline-block;background:#eff6ff;color:#2563eb;padding:5px 14px;border-radius:20px;margin:4px;}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="box">
            <img class="avatar" src="https://picsum.photos/130/130" alt="头像">
            <h1>在这里改你的名字</h1>
            <div class="sub">个人主页 | 日常分享</div>

            <div class="tit">关于我</div>
            <p>在这里写你的自我介绍，爱好、职业、想说的话都可以直接改文字。</p>

            <div class="tit">兴趣爱好</div>
            <div>
                <span class="tag">生活记录</span>
                <span class="tag">听歌</span>
                <span class="tag">旅行</span>
                <span class="tag">追剧</span>
            </div>

            <div class="tit">联系方式</div>
            <p>邮箱：xxx@qq.com</p>
            <p>微信：xxxxxxx</p>
        </div>
    </div>
</body>
</html>
