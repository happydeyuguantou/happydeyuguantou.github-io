        }

            gap: 12px;

        }

            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn {
            padding: 7px 16px;
            background: #2d5b99;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:disabled {
            background: #999;

        }

            border: 1px solid #e8e8;
            padding: 20px;
            border-radius: 6px;
            min-height: 240px;
            line-height: 2.1;
            font-size: 16px;
        }
        .char {
            display: inline-block;
            cursor: pointer;
            padding: 0 3px;
            border-radius: 3px;
        }
        .char:hover {
            background: #e6f0ff;
        }
        .char.active {
            background: #d0e2ff;
        }
        /* 悬浮弹窗 */
        .float-tip {
            position: absolute;
            background: #fff;
            border: 2px solid #2d5b99;
            border-radius: 6px;
            padding: 12px;
            box-shadow: 0 4px 12px rgba(0,0,0.15);
            z-index: 999;
            max-width: 320px;
            font-size: 14px;
        }

            margin-top: 20px;
            border-top: 1px dashed #ccc;
            padding-top: 15px;
        }
        .note-item {
            margin: 8px 0;
            font-size: 14px;
        }

            padding: 2px 6px;

            margin-right: 6px;

            padding: 18px;
            border-radius: 6px;
            margin-bottom: 20px;

            margin: 12px 0;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

            display: grid;

            margin: 10px 0;
        }
        .check-item {
            font-size: 14px;
            cursor: pointer;
        }

            background: #f0f7ff;

            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            gap: 30px;
        }

            border: 1px solid #e8e8e8;

            border-radius: 6px;
            min-height: 260px;
        }

            font-size: 16px;
            line-height: 1.8;
            margin: 15px 0;
        }
        .q-word {
            color: #d82e2e;
            font-weight: bold;
            text-decoration: underline;

        .opts {

            gap: 10px;

            border: 1px solid #ccc;
            padding: 11px;

            background: #fef2f2;

</head>

// 页面元素 & 全局变量
const tabBtns = document.querySelectorAll('.tab-btn');
const readPage = document.getElementById('readPage');
const testPage = document.getElementById('testPage');

// 阅读页
const artSelect = document.getElementById('artSelect');
const artMain = document.getElementById('artMain');
const switchNoteBtn = document.getElementById('switchNoteBtn');
const globalNote = document.getElementById('globalNote');
const floatTip = document.getElementById('floatTip');
let showGlobal = false;
let currentReadArt = null;

// 答题页
const testType = document.getElementById('testType');
const totalQInput = document.getElementById('totalQ');
const startTestBtn = document.getElementById('startTestBtn');
const artChecks = document.querySelectorAll('#artCheck input[type="checkbox"]');
const qBox = document.getElementById('qBox');
const allNum = document.getElementById('allNum');
const doneNum = document.getElementById('doneNum');
const rightNum = document.getElementById('rightNum');
const wrongNum = document.getElementById('wrongNum');
const rate = document.getElementById('rate');

// 答题全局变量
let testPool = [];
let nowIndex = 0;
let totalCount = 0;
let rightCount = 0;
let wrongCount = 0;

// 标签切换
tabBtns.forEach(btn => {
    btn.onclick = () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const page = btn.dataset.page;
        if(page === 'read'){
            readPage.classList.remove('hide');
            testPage.classList.add('hide');
        }else{
            readPage.classList.add('hide');
            testPage.classList.remove('hide');
        }
    };
});

// 选择篇目
artSelect.onchange = function(){
    const aid = Number(this.value);
    if(!aid){
        artMain.innerText = "请在上方选择对应篇目查看原文";
        globalNote.classList.add('hide');
        return;
    }
    currentReadArt = articleData.find(d => d.id === aid);
    renderReadArticle();
};

// 渲染原文
function renderReadArticle(){
    if(!currentReadArt) return;
    let html = "";
    const charMap = {};
    currentReadArt.chars.forEach(c => charMap[c.char] = c);

    for(let ch of currentReadArt.text){
        if(charMap[ch]){
            html += `<span class="char" data-char="${ch}">${ch}</span>`;
        }else{
            html += ch;
        }
    }
    artMain.innerHTML = html;
    bindCharClick();
    if(showGlobal) renderGlobalNote();
    else globalNote.classList.add('hide');
}

// 绑定单字点击
function bindCharClick(){
    document.querySelectorAll('.char').forEach(el => {
        el.onclick = function(e){
            e.stopPropagation();
            const ch = this.dataset.char;
            const data = currentReadArt.chars.find(x => x.char === ch);
            if(!data) return;

            const rect = this.getBoundingClientRect();
            floatTip.style.left = rect.left + "px";
            floatTip.style.top = (rect.bottom + 10) + "px";
            floatTip.classList.remove('hide');

            let exp = data.explain.join("；");
            floatTip.innerHTML = `
                <p><strong>字：${ch}</strong> 【${data.pinyin}】</p>
                <p>本义/语境释义：${data.origin}</p>
                <p>其他释义/语法：${exp}</p>
            `;
            this.classList.add('active');
        };
    });
}

// 关闭弹窗
document.addEventListener('click', () => {
    floatTip.classList.add('hide');
    document.querySelectorAll('.char').forEach(el => el.classList.remove('active'));
});

// 全局注释切换
switchNoteBtn.onclick = function(){
    showGlobal = !showGlobal;
    this.innerText = showGlobal ? "隐藏全局注释" : "全局显示注释";
    showGlobal ? renderGlobalNote() : globalNote.classList.add('hide');
};

function renderGlobalNote(){
    if(!currentReadArt) return;
    let html = "<h4>全文字词注释</h4>";
    currentReadArt.chars.forEach(d => {
        let exp = d.explain.join("；");
        html += `<div class="note-item"><span>${d.char}</span>【${d.pinyin}】${d.origin} | 其他：${exp}</div>`;
    });
    globalNote.innerHTML = html;
    globalNote.classList.remove('hide');
}

// 数组打乱
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

// 开始答题
startTestBtn.onclick = function(){
    const selectIds = [];
    artChecks.forEach(cb => {
        if(cb.checked) selectIds.push(Number(cb.value));
    });
    if(selectIds.length === 0){
        alert("请至少选择一篇考察篇目！");
        return;
    }

    testPool = [];
    nowIndex = 0;
    rightCount = 0;
    wrongCount = 0;
    startTestBtn.disabled = true;

    const type = testType.value;
    selectIds.forEach(id => {
        const art = articleData.find(d => d.id === id);
        if(!art) return;
        art.chars.forEach(char => {
            if(type === 'all' || (type === 'empty' && char.type === 'empty') || (type === 'oldnew')){
                testPool.push({...char, article: art});
            }
        });
    });

    if(testPool.length === 0){
        alert("当前选择范围+题型下，无可用题目！");
        startTestBtn.disabled = false;
        return;
    }

    let wantNum = parseInt(totalQInput.value) || 1;
    totalCount = Math.min(wantNum, testPool.length);
    shuffle(testPool);

    allNum.innerText = totalCount;
    doneNum.innerText = 0;
    rightNum.innerText = 0;
    wrongNum.innerText = 0;
    rate.innerText = "0%";

    renderQuestion();
};

// 渲染题目：固定4个选项，原有逻辑全部保留
function renderQuestion(){
    if(nowIndex >= totalCount){
        qBox.innerHTML = `
            <h3>✅ 答题完成！</h3>
            <p>总计${totalCount}题，答对${rightCount}题，答错${wrongCount}题</p>
            <p>正确率：${((rightCount/totalCount)*100).toFixed(1)}%</p>
        `;
        startTestBtn.disabled = false;
        return;
    }

    const item = testPool[nowIndex];
    const art = item.article;
    const hasCharSentences = art.sentences.filter(s => s.includes(item.char));
    const targetSentence = hasCharSentences.length > 0 ? hasCharSentences[Math.floor(Math.random()*hasCharSentences.length)] : art.text;
    const showSen = targetSentence.replace(item.char, `<span class="q-word">${item.char}</span>`);

    // 合并释义 + 去重
    let allMean = [item.origin, ...item.explain];
    const uniqueMean = [...new Set(allMean)];
    let options = [];
    for(let text of uniqueMean){
        options.push({
            text: text,
            isRight: text === item.origin
        });
    }

    // 固定补足到4个选项
    if(options.length < 4){
        const extraPool = [];
        testPool.forEach(cc => {
            if(cc.char !== item.char){
                extraPool.push(...cc.explain, cc.origin);
            }
        });
        const existTxt = options.map(o => o.text);
        const validExtra = [...new Set(extraPool)].filter(t => !existTxt.includes(t));
        shuffle(validExtra);
        while(options.length < 4 && validExtra.length > 0){
            options.push({
                text: validExtra.shift(),
                isRight: false
            });
        }
    }

    // 打乱选项顺序
    shuffle(options);

    // 拼接HTML
    let html = `
        <p><strong>第${nowIndex+1}题</strong></p>
        <p>请解释划线字词含义/语法作用：</p>
        <div class="q-sentence">${showSen}</div>
        <div class="opts">
    `;
    options.forEach((opt, idx) => {
        html += `<div class="opt" data-right="${opt.isRight}">${idx+1}. ${opt.text}</div>`;
    });
    html += `</div><div class="tip-text"></div>`;
    qBox.innerHTML = html;

    document.querySelectorAll('.opt').forEach(el => el.onclick = selectAnswer);
}

// 选择答案 & 计分（原逻辑不变）
function selectAnswer(e){
    const el = e.target;
    const isRight = el.dataset.right === "true";
    const tip = document.querySelector('.tip-text');
    document.querySelectorAll('.opt').forEach(o => o.style.pointerEvents = "none");

    if(isRight){
        el.classList.add('correct');
        tip.className = "tip-text right";
        rightCount++;
    }else{
        el.classList.add('error');
        document.querySelectorAll('.opt').forEach(o => {
            if(o.dataset.right === "true") o.classList.add('correct');
        });
        tip.className = "tip-text wrong";
        tip.innerText = "❌ 回答错误";
    }

    doneNum.innerText = nowIndex + 1;
    rightNum.innerText = rightCount;
    wrongNum.innerText = wrongCount;
    let r = ((rightCount / (nowIndex+1)) * 100).toFixed(1);
    rate.innerText = r + "%";

    setTimeout(() => {
        nowIndex++;
        renderQuestion();
    }, 1500);
}
</script>
