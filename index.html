<html lang="zh-CN">

  <style>
    * {box-sizing: border-box; font-family: system-ui, sans-serif;}
    body {max-width: 1200px; margin: 0 auto; padding: 20px; background: #f7f9fc;}
    .tab-wrap {margin-bottom: 20px;}
    .tab-btn {padding: 10px 24px; font-size: 16px; border: none; cursor: pointer; background: #e2e8f0;}
    .tab-btn.active {background: #2563eb; color: white;}
    .panel {display: none; background: white; padding: 24px; border-radius: 10px; box-shadow: 0 2px 12px #00000012;}
    .panel.show {display: block;}
    .control-row {margin-bottom: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;}
    input[type="number"], select {padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; width: 140px;}
    button {padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;}
    button.blue {background: #3b82f6; color:#fff;}
    button.secondary {background: #64748b; color:#fff;}
    button.danger {background: #ef4444; color:#fff;}
    button.success {background: #10b981; color:#fff;}
    button:disabled {background: #cbd5e1; color: #64748b; cursor: not-allowed;}
    .question-item {border: 1px solid #e2e8f0; padding: 14px; border-radius: 8px; margin-bottom: 12px;}
    .blank-input {width: 180px; padding: 6px 8px; margin: 0 6px; border: 1px solid #94a3b8; border-radius: 4px;}
    .wrong {background: #fee2e2; border: 1px solid #f87171;}
    .correct-ans {color: #16a34a; font-weight: bold; margin-left: 8px;}
    .chinese-hint {color: #6b7280; font-size: 14px;}
    .word-box {background: #f1f5f9; padding: 10px; border-radius: 6px; margin: 8px 0;}
    .stat-box {margin-top: 20px; padding: 16px; background: #dbeafe; border-radius: 8px; font-size: 18px;}
    .journal-checklist, .word-checklist {display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; max-height: 200px; overflow-y: auto; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;}
    .journal-item, .word-item {display: flex; align-items: center; gap: 4px; width: 180px; font-size: 14px;}
    .hidden {display: none;}
    .ssp-title {margin-top: 0;}
    #range-inputs input {width: 80px;}
    .sub-setting {margin-left: 20px; padding-left: 12px; border-left: 2px solid #e2e8f0;}

    /* 默写/翻译通用样式 */
    .sentence-list {max-height: 420px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin: 10px 0; background: #fafbfc;}
    .sentence-item {padding: 10px 0; border-bottom: 1px solid #eef2f7; display: flex; gap: 10px; align-items: flex-start; line-height: 1.6;}
    .sentence-item:last-child {border-bottom: none;}
    .sentence-item input {margin-top: 5px; flex-shrink: 0;}
    .sentence-item .sentence-text {flex: 1;}
    .sentence-item .en {color: #1e293b;}
    .sentence-item .cn {color: #64748b; font-size: 14px; margin-top: 4px;}
    .answer-input {width: 100%; padding: 10px 12px; font-size: 16px; margin: 12px 0;}
    .wrong-item {padding: 10px; background: #fef2f2; border-radius: 6px; margin-bottom: 8px; font-size: 15px;}
    .wrong-item .tag {display: inline-block; padding: 2px 8px; background: #ef4444; color: white; border-radius: 4px; font-size: 13px; margin-right: 8px;}
    .mode-panel {margin-bottom: 16px;}

    /* 精细化判卷错误样式 */
    .spell-error { color: #dc2626; border-bottom: 2px solid #dc2626; cursor: help; }
    .extra-word { color: #dc2626; text-decoration: line-through; cursor: help; }
    .order-error { color: #b45309; border-bottom: 2px solid #b45309; cursor: help; }
    .missing-hint { color: #dc2626; background: #fee2e2; padding: 0 4px; border-radius: 3px; font-size: 0.9em; margin: 0 2px; cursor: help; }
    .error-detail { margin-top: 8px; font-size: 13px; color: #64748b; font-weight: normal; }
    .ans-block { margin: 4px 0; line-height: 1.8; }

<script>
// ===================== 精细化判卷核心算法 =====================
// 分词：拆分单词和标点，自动忽略空格差异
function tokenize(str) {
  const tokens = [];
  const regex = /([a-zA-Z][a-zA-Z'-]*)|([.,!?;:"'()\[\]])/g;
  let match;
  while ((match = regex.exec(str)) !== null) {
    if (match[1]) {
      tokens.push({ type: 'word', text: match[1], lower: match[1].toLowerCase() });
    } else if (match[2]) {
      tokens.push({ type: 'punct', text: match[2], lower: match[2] });
    }
  }
  return tokens;
}

// 提取单词列表及其在原token中的索引
function extractWords(tokens) {
  const words = [];
  tokens.forEach((token, idx) => {
    if (token.type === 'word') {
      words.push({ index: idx, lower: token.lower, text: token.text });
    }
  });
  return words;
}

// 计算莱文斯坦距离（编辑距离）
function levenshtein(a, b) {
  const matrix = [];
  for (let i = 0; i <= b.length; i++) {
    matrix[i] = [i];
  }
  for (let j = 0; j <= a.length; j++) {
    matrix[0][j] = j;
  }
  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
      }
    }
  }
  return matrix[b.length][a.length];
}

// 计算最长公共子序列，返回匹配的索引对
function lcsMatch(correctWords, userWords) {
  const n = correctWords.length;
  const m = userWords.length;
  const dp = Array.from({ length: n + 1 }, () => Array(m + 1).fill(0));
  
  for (let i = 1; i <= n; i++) {
    for (let j = 1; j <= m; j++) {
      if (correctWords[i - 1].lower === userWords[j - 1].lower) {
        dp[i][j] = dp[i - 1][j - 1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
      }
    }
  }
  
  const matches = [];
  let i = n, j = m;
  while (i > 0 && j > 0) {
    if (correctWords[i - 1].lower === userWords[j - 1].lower) {
      matches.push([i - 1, j - 1]);
      i--;
      j--;
    } else if (dp[i - 1][j] > dp[i][j - 1]) {
      i--;
    } else {
      j--;
    }
  }
  matches.reverse();
  return matches;
}

// 主错误分析函数：四类错误独立检测，互不干扰
function analyzeErrors(correctSentence, userSentence) {
  const correctTokens = tokenize(correctSentence);
  const userTokens = tokenize(userSentence);
  const correctWords = extractWords(correctTokens);
  const userWords = extractWords(userTokens);
  
  const correctWordStatus = new Array(correctWords.length).fill('missing');
  const userWordStatus = new Array(userWords.length).fill('extra');
  
  // 第一步：LCS完全匹配（找出所有位置正确的单词）
  const matches = lcsMatch(correctWords, userWords);
  matches.forEach(([cIdx, uIdx]) => {
    correctWordStatus[cIdx] = 'matched';
    userWordStatus[uIdx] = 'matched';
  });
  
  // 第二步：检测顺序错误（单词完全正确但位置不匹配）
  let unmatchedCorrect = [];
  let unmatchedUser = [];
  correctWordStatus.forEach((status, idx) => {
    if (status === 'missing') unmatchedCorrect.push(idx);
  });
  userWordStatus.forEach((status, idx) => {
    if (status === 'extra') unmatchedUser.push(idx);
  });
  
  const correctFreq = {};
  unmatchedCorrect.forEach(idx => {
    const word = correctWords[idx].lower;
    correctFreq[word] = (correctFreq[word] || 0) + 1;
  });
  const userFreq = {};
  unmatchedUser.forEach(idx => {
    const word = userWords[idx].lower;
    userFreq[word] = (userFreq[word] || 0) + 1;
  });
  
  const commonWords = Object.keys(correctFreq).filter(w => userFreq[w]);
  commonWords.forEach(word => {
    const count = Math.min(correctFreq[word], userFreq[word]);
    let matched = 0;
    for (let i = 0; i < unmatchedCorrect.length && matched < count; i++) {
      const idx = unmatchedCorrect[i];
      if (correctWords[idx].lower === word && correctWordStatus[idx] === 'missing') {
        correctWordStatus[idx] = 'order-error';
        matched++;
      }
    }
    matched = 0;
    for (let i = 0; i < unmatchedUser.length && matched < count; i++) {
      const idx = unmatchedUser[i];
      if (userWords[idx].lower === word && userWordStatus[idx] === 'extra') {
        userWordStatus[idx] = 'order-error';
        matched++;
      }
    }
  });
  
  // 第三步：拼写错误匹配（编辑距离≤2判定为拼写错误）
  unmatchedCorrect = [];
  unmatchedUser = [];
  correctWordStatus.forEach((status, idx) => {
    if (status === 'missing') unmatchedCorrect.push(idx);
  });
  userWordStatus.forEach((status, idx) => {
    if (status === 'extra') unmatchedUser.push(idx);
  });
  
  const pairs = [];
  unmatchedCorrect.forEach(cIdx => {
    unmatchedUser.forEach(uIdx => {
      const cWord = correctWords[cIdx].lower;
      const uWord = userWords[uIdx].lower;
      const dist = levenshtein(cWord, uWord);
      const lenDiff = Math.abs(cWord.length - uWord.length);
      if (dist <= 2 && lenDiff <= 2 && cWord.length > 1 && uWord.length > 1) {
        pairs.push({ cIdx, uIdx, dist });
      }
    });
  });
  
  pairs.sort((a, b) => a.dist - b.dist);
  const usedCorrect = new Set();
  const usedUser = new Set();
  pairs.forEach(pair => {
    if (!usedCorrect.has(pair.cIdx) && !usedUser.has(pair.uIdx)) {
      correctWordStatus[pair.cIdx] = 'spell-error';
      userWordStatus[pair.uIdx] = 'spell-error';
      usedCorrect.add(pair.cIdx);
      usedUser.add(pair.uIdx);
    }
  });
  
  // 生成用户答案标红HTML（带正常空格格式）
  const userParts = [];
  let userWordPtr = 0;
  userTokens.forEach(token => {
    if (token.type === 'punct') {
      userParts.push(token.text);
    } else {
      const status = userWordStatus[userWordPtr];
      const text = token.text;
      let part;
      switch (status) {
        case 'matched':
          part = text;
          break;
        case 'spell-error':
          part = `<span class="spell-error" title="拼写错误">${text}</span>`;
          break;
        case 'order-error':
          part = `<span class="order-error" title="顺序错误">${text}</span>`;
          break;
        case 'extra':
          part = `<span class="extra-word" title="多余单词">${text}</span>`;
          break;
        default:
          part = text;
      }
      userParts.push(part);
      userWordPtr++;
    }
  });
  let userHTML = userParts.join(' ');
  // 清理标点前后多余空格
  userHTML = userHTML.replace(/\s+([.,!?;:)\]])/g, '$1');
  userHTML = userHTML.replace(/([(\[])\s+/g, '$1');

  // 生成正确答案标注HTML（带正常空格格式）
  const correctParts = [];
  let correctWordPtr = 0;
  correctTokens.forEach(token => {
    if (token.type === 'punct') {
      correctParts.push(token.text);
    } else {
      const status = correctWordStatus[correctWordPtr];
      const text = token.text;
      let part;
      switch (status) {
        case 'matched':
          part = text;
          break;
        case 'spell-error':
          part = `<span class="spell-error" title="对应拼写错误">${text}</span>`;
          break;
        case 'order-error':
          part = `<span class="order-error" title="对应顺序错误">${text}</span>`;
          break;
        case 'missing':
          part = `<span class="missing-hint" title="缺失单词">${text}</span>`;
          break;
        default:
          part = text;
      }
      correctParts.push(part);
      correctWordPtr++;
    }
  });
  let correctHTML = correctParts.join(' ');
  // 清理标点前后多余空格
  correctHTML = correctHTML.replace(/\s+([.,!?;:)\]])/g, '$1');
  correctHTML = correctHTML.replace(/([(\[])\s+/g, '$1');
  
  // 错误统计
  const stats = {
    missing: correctWordStatus.filter(s => s === 'missing').length,
    spellError: userWordStatus.filter(s => s === 'spell-error').length,
    extra: userWordStatus.filter(s => s === 'extra').length,
    orderError: userWordStatus.filter(s => s === 'order-error').length,
    isCorrect: userWordStatus.every(s => s === 'matched') && correctWordStatus.every(s => s === 'matched')
  };
  
  return { userHTML, correctHTML, stats };
}

// ===================== Wonder页面逻辑 =====================
let currentWonderQs = [];
const showChineseKey = "wonderShowChinese";
const showFirstLetterKey = "wonderShowFirstLetter";
const showChineseCheckbox = document.getElementById("show-chinese");
const showFirstLetterCheckbox = document.getElementById("show-first-letter");
const modeRadios = document.querySelectorAll('input[name="wonder-mode"]');
const rangeInputs = document.getElementById("range-inputs");
const wonderStartInput = document.getElementById("wonder-start");
const wonderEndInput = document.getElementById("wonder-end");

function loadWonderSettings(){
  const savedCn = localStorage.getItem(showChineseKey);
  showChineseCheckbox.checked = (savedCn === "true");
  const savedFl = localStorage.getItem(showFirstLetterKey);
  showFirstLetterCheckbox.checked = (savedFl === "true");
}
loadWonderSettings();

showChineseCheckbox.addEventListener("change", function(){
  localStorage.setItem(showChineseKey, this.checked);
  if(currentWonderQs.length > 0) renderWonder();
});

showFirstLetterCheckbox.addEventListener("change", function(){
  localStorage.setItem(showFirstLetterKey, this.checked);
  if(currentWonderQs.length > 0) renderWonder();
});

modeRadios.forEach(radio=>{
  radio.addEventListener("change", function(){
    if(this.value === "range"){
      rangeInputs.classList.remove("hidden");
    }else{
      rangeInputs.classList.add("hidden");
    }
  });
});

function renderWonder(){
  const wrap = document.getElementById("wonder-qs");
  wrap.innerHTML = "";
  const showCn = showChineseCheckbox.checked;
  const showFl = showFirstLetterCheckbox.checked;

  const getFirstLetter = (ans) => {
    return ans.split(";").map(part => part.trim().charAt(0)).join(";");
  };

  currentWonderQs.forEach((item,idx)=>{
    let sentence = item.en.replace(/_{2,}/g,"___");
    let hint = showCn ? `(${item.cn})` : "";
    let placeholder = showFl ? `首字母: ${getFirstLetter(item.ans)}` : "填写答案";
    
    let html = `
      <div class="question-item" data-index="${idx}">
        <p>${idx+1}. ${sentence} ${hint}</p>
        <input class="blank-input wonder-in" data-ans="${item.ans}" placeholder="${placeholder}">
        <span class="correct-ans hidden"></span>
      </div>
    `;
    wrap.innerHTML += html;
  });
}

document.getElementById("gen-wonder").onclick = ()=>{
  const num = Number(document.getElementById("wonder-count").value);
  const mode = document.querySelector('input[name="wonder-mode"]:checked').value;
  let pool = [];

  if(mode === "range"){
    const start = Number(wonderStartInput.value);
    const end = Number(wonderEndInput.value);
    if(start < 1 || end > wonderDB.length || start > end){
      alert(`请输入合法的题号范围，有效范围为 1 - ${wonderDB.length}`);
      return;
    }
    const rangeCount = end - start + 1;
    if(num > rangeCount){
      alert(`该范围内共 ${rangeCount} 道题，出题数量不能超过总数`);
      return;
    }
    pool = wonderDB.slice(start - 1, end);
  }else{
    pool = [...wonderDB];
  }

  const shuffled = pool.sort(()=>Math.random()-0.5);
  currentWonderQs = shuffled.slice(0, Math.min(num, pool.length));
  renderWonder();
};

document.getElementById("check-wonder").onclick = ()=>{
  document.querySelectorAll(".wonder-in").forEach(input=>{
    const wrap = input.closest(".question-item");
    const ansSpan = wrap.querySelector(".correct-ans");
    ansSpan.classList.remove("hidden");
    ansSpan.textContent = `标准答案：${input.dataset.ans}`;
    const user = input.value.trim().toLowerCase();
    const cor = input.dataset.ans.toLowerCase();
    if(user !== cor){
      wrap.classList.add("wrong");
      input.style.borderColor = "#ef4444";
    }else{
      wrap.classList.remove("wrong");
      input.style.borderColor = "#16a34a";
    }
  });
};

document.getElementById("reset-wonder").onclick = ()=>{
  currentWonderQs = [];
  document.getElementById("wonder-qs").innerHTML = "";
};

const sspQuestions = [...sspOriginalQuestions, ...sspNewQuestions];

// ===================== SSP页面逻辑 =====================
let sspPool = [];
let currentSspSet = null;
let sspDoneCount = 0;
let sspWrongTotal = 0;
let sspTotalQ = 0;
const nextSspBtn = document.getElementById("next-ssp");
const checkSspBtn = document.getElementById("check-ssp");

// 渲染期刊列表
function renderJournalList(){
  const listWrap = document.getElementById("journal-list");
  if(listWrap.children.length > 0) return;
  const journalIds = [...new Set(sspOriginalQuestions.map(q=>q.journalId))];
  journalIds.forEach(jId=>{
    const div = document.createElement("div");
    div.className = "journal-item";
    const inputId = `j-${jId}`;
    div.innerHTML = `<input type="checkbox" value="${jId}" id="${inputId}"> <label for="${inputId}">${jId}</label>`;
    listWrap.appendChild(div);
  });
}

// 渲染词语列表
function renderWordList(){
  const listWrap = document.getElementById("word-list");
  if(listWrap.children.length > 0) return;
  const wordList = [...new Set(sspQuestions.map(q=>q.root))].sort();
  wordList.forEach(word=>{
    const div = document.createElement("div");
    div.className = "word-item";
    const inputId = `w-${word}`;
    div.innerHTML = `<input type="checkbox" value="${word}" id="${inputId}"> <label for="${inputId}">${word}</label>`;
    listWrap.appendChild(div);
  });
}

// 出题模式切换
document.querySelectorAll('input[name="ssp-mode"]').forEach(radio=>{
  radio.addEventListener("change", function(){
    document.getElementById("custom-ssp-settings").classList.toggle("hidden", this.value !== "custom");
    document.getElementById("word-ssp-settings").classList.toggle("hidden", this.value !== "word");
    updateJournalRangeVisibility();
  });
});

// 题目来源切换，控制期刊范围显示
document.querySelectorAll('input[name="ssp-source"]').forEach(radio=>{
  radio.addEventListener("change", updateJournalRangeVisibility);
});

function updateJournalRangeVisibility(){
  const mode = document.querySelector('input[name="ssp-mode"]:checked').value;
  const journalWrap = document.getElementById("journal-range-wrap");
  
  if(mode === "word"){
    journalWrap.classList.add("hidden");
    return;
  }
  
  if(mode === "original"){
    journalWrap.classList.remove("hidden");
    return;
  }
  
  if(mode === "custom"){
    const source = document.querySelector('input[name="ssp-source"]:checked').value;
    if(source === "new"){
      journalWrap.classList.add("hidden");
    }else{
      journalWrap.classList.remove("hidden");
    }
  }
}

document.getElementById("select-all-journals").onclick = ()=>{
  document.querySelectorAll("#journal-list input").forEach(cb=>cb.checked=true);
};

document.getElementById("select-all-words").onclick = ()=>{
  document.querySelectorAll("#word-list input").forEach(cb=>cb.checked=true);
};

document.getElementById("clear-all-words").onclick = ()=>{
  document.querySelectorAll("#word-list input").forEach(cb=>cb.checked=false);
};

// 开始答题
document.getElementById("start-ssp").onclick = ()=>{
  sspPool = [];
  sspDoneCount = 0;
  sspWrongTotal = 0;
  sspTotalQ = 0;
  document.getElementById("ssp-stat").classList.add("hidden");

  const mode = document.querySelector('input[name="ssp-mode"]:checked').value;

  if(mode === "original"){
    const checkedBoxes = document.querySelectorAll("#journal-list input:checked");
    if(checkedBoxes.length === 0){
      alert("请先勾选至少一套期刊再开始答题！");
      return;
    }
    const selectedJournals = Array.from(checkedBoxes).map(cb=>cb.value);
    selectedJournals.forEach(jId=>{
      const journalQs = sspOriginalQuestions.filter(q=>q.journalId === jId);
      const set0 = journalQs.filter(q=>q.setId === 0);
      const set1 = journalQs.filter(q=>q.setId === 1);
      
      if(set0.length > 0){
        sspPool.push({
          journalId: `${jId} 第1组`,
          questions: set0,
          box: set0.map(q=>q.root)
        });
      }
      if(set1.length > 0){
        sspPool.push({
          journalId: `${jId} 第2组`,
          questions: set1,
          box: set1.map(q=>q.root)
        });
      }
    });
  }
  else if(mode === "custom"){
    const source = document.querySelector('input[name="ssp-source"]:checked').value;
    const perGroup = Number(document.getElementById("ssp-custom-per").value);
    const groupCount = Number(document.getElementById("ssp-custom-groups").value);
    
    let questionPool = [];
    if(source === "original"){
      const checkedBoxes = document.querySelectorAll("#journal-list input:checked");
      if(checkedBoxes.length === 0){
        alert("请先勾选原题考察的期刊范围！");
        return;
      }
      const selectedJournals = Array.from(checkedBoxes).map(cb=>cb.value);
      questionPool = sspOriginalQuestions.filter(q=>selectedJournals.includes(q.journalId));
    }else if(source === "new"){
      questionPool = [...sspNewQuestions];
    }else{
      const checkedBoxes = document.querySelectorAll("#journal-list input:checked");
      if(checkedBoxes.length === 0){
        alert("请先勾选原题考察的期刊范围！");
        return;
      }
      const selectedJournals = Array.from(checkedBoxes).map(cb=>cb.value);
      const originalPart = sspOriginalQuestions.filter(q=>selectedJournals.includes(q.journalId));
      questionPool = [...originalPart, ...sspNewQuestions];
    }

    const totalNeed = perGroup * groupCount;
    if(totalNeed > questionPool.length){
      alert(`符合条件的题目共 ${questionPool.length} 道，无法生成 ${groupCount} 组、每组 ${perGroup} 题。请减少组数或每组题数。`);
      return;
    }

    const shuffled = [...questionPool].sort(()=>Math.random()-0.5);
    for(let i=0; i<groupCount; i++){
      const start = i * perGroup;
      const groupQs = shuffled.slice(start, start + perGroup);
      sspPool.push({
        journalId: `自定义第${i+1}组`,
        questions: groupQs,
        box: groupQs.map(q=>q.root)
      });
    }
  }
  else if(mode === "word"){
    const checkedWords = document.querySelectorAll("#word-list input:checked");
    if(checkedWords.length === 0){
      alert("请先勾选至少一个考察词语！");
      return;
    }
    const selectedWords = Array.from(checkedWords).map(cb=>cb.value);
    const perGroup = Number(document.getElementById("ssp-word-per").value);
    const groupCount = Number(document.getElementById("ssp-word-groups").value);
    
    const questionPool = sspQuestions.filter(q=>selectedWords.includes(q.root));
    const totalNeed = perGroup * groupCount;
    if(totalNeed > questionPool.length){
      alert(`符合条件的题目共 ${questionPool.length} 道，无法生成 ${groupCount} 组、每组 ${perGroup} 题。`);
      return;
    }

    const shuffled = [...questionPool].sort(()=>Math.random()-0.5);
    for(let i=0; i<groupCount; i++){
      const start = i * perGroup;
      const groupQs = shuffled.slice(start, start + perGroup);
      sspPool.push({
        journalId: `选词第${i+1}组`,
        questions: groupQs,
        box: groupQs.map(q=>q.root)
      });
    }
  }

  sspTotalQ = sspPool.reduce((sum, set)=>sum + set.questions.length, 0);
  sspDoneCount = 0;
  sspWrongTotal = 0;
  currentSspSet = 0;
  renderSspSet();
  nextSspBtn.disabled = sspPool.length <= 1;
  checkSspBtn.disabled = false;
};

function renderSspSet(){
  const set = sspPool[currentSspSet];
  const wrap = document.getElementById("ssp-current-set");
  wrap.innerHTML = `<h3 class="ssp-title">${set.journalId}</h3>`;
  
  const boxHtml = `<div class="word-box"><strong>词框：</strong>${set.box.join(" / ")}</div>`;
  wrap.innerHTML += boxHtml;

  set.questions.forEach((q, idx)=>{
    const html = `
      <div class="question-item" data-index="${idx}">
        <p>${idx+1}. ${q.en.replace("____", "___")}</p>
        <input class="blank-input ssp-in" data-ans="${q.ans}" placeholder="填写答案">
        <span class="correct-ans hidden"></span>
      </div>
    `;
    wrap.innerHTML += html;
  });
}

document.getElementById("check-ssp").onclick = ()=>{
  let wrong = 0;
  document.querySelectorAll(".ssp-in").forEach(input=>{
    const wrap = input.closest(".question-item");
    const ansSpan = wrap.querySelector(".correct-ans");
    ansSpan.classList.remove("hidden");
    ansSpan.textContent = `标准答案：${input.dataset.ans}`;
    const user = input.value.trim().toLowerCase();
    const cor = input.dataset.ans.toLowerCase();
    if(user !== cor){
      wrap.classList.add("wrong");
      input.style.borderColor = "#ef4444";
      wrong++;
    }else{
      wrap.classList.remove("wrong");
      input.style.borderColor = "#16a34a";
    }
  });

  sspWrongTotal += wrong;
  sspDoneCount += sspPool[currentSspSet].questions.length;

  const statBox = document.getElementById("ssp-stat");
  statBox.classList.remove("hidden");
  statBox.innerHTML = `
    <p>已完成：${sspDoneCount} / ${sspTotalQ} 题</p>
    <p>当前套错误：${wrong} 题</p>
    <p>累计错误：${sspWrongTotal} 题</p>
    <p>累计正确率：${((sspDoneCount - sspWrongTotal) / sspDoneCount * 100).toFixed(1)}%</p>
  `;
};

document.getElementById("next-ssp").onclick = ()=>{
  if(currentSspSet < sspPool.length - 1){
    currentSspSet++;
    renderSspSet();
    if(currentSspSet === sspPool.length - 1){
      nextSspBtn.disabled = true;
    }
  }
};

document.getElementById("reset-ssp").onclick = ()=>{
  sspPool = [];
  currentSspSet = null;
  sspDoneCount = 0;
  sspWrongTotal = 0;
  sspTotalQ = 0;
  document.getElementById("ssp-current-set").innerHTML = "";
  document.getElementById("ssp-stat").classList.add("hidden");
  nextSspBtn.disabled = true;
  checkSspBtn.disabled = true;
};

// 页面初始化
renderJournalList();
renderWordList();

// ===================== 新概念默写页面逻辑 =====================
let nceQuizList = [];
let nceCurrentIndex = 0;
let nceRightCount = 0;
let nceWrongList = [];

// 初始化下拉选择框
function initNceSelects(){
  const lessonSelect = document.getElementById("nce-lesson-select");
  const selectLesson = document.getElementById("nce-select-lesson");
  if(lessonSelect.options.length > 0) return;

  nceDB.forEach(lesson=>{
    const opt1 = document.createElement("option");
    opt1.value = lesson.id;
    opt1.textContent = lesson.title;
    lessonSelect.appendChild(opt1);

    const opt2 = document.createElement("option");
    opt2.value = lesson.id;
    opt2.textContent = lesson.title;
    selectLesson.appendChild(opt2);
  });
}

// 模式切换
document.querySelectorAll('input[name="nce-mode"]').forEach(radio=>{
  radio.addEventListener("change", function(){
    document.getElementById("nce-random-panel").classList.toggle("hidden", this.value !== "random");
    document.getElementById("nce-lesson-panel").classList.toggle("hidden", this.value !== "lesson");
    document.getElementById("nce-select-panel").classList.toggle("hidden", this.value !== "select");
  });
});

// 随机模式开始
document.getElementById("nce-start-random").onclick = ()=>{
  const count = Number(document.getElementById("nce-random-count").value);
  let allSentences = [];
  nceDB.forEach(lesson=>{
    lesson.sentences.forEach(s=>{
      allSentences.push({...s, lesson: lesson.title});
    });
  });
  
  if(count > allSentences.length){
    alert(`全题库共 ${allSentences.length} 个句子，请输入更小的数量`);
    return;
  }

  nceQuizList = allSentences.sort(()=>Math.random()-0.5).slice(0, count);
  startNceQuiz();
};

document.getElementById("nce-start-lesson").onclick = ()=>{
  const lessonId = Number(document.getElementById("nce-lesson-select").value);
  const count = Number(document.getElementById("nce-lesson-count").value);
  const lesson = nceDB.find(l=>l.id === lessonId);
  
  if(count > lesson.sentences.length){
    alert(`本课共 ${lesson.sentences.length} 个句子，请输入更小的数量`);
    return;
  }

  nceQuizList = [...lesson.sentences].sort(()=>Math.random()-0.5).slice(0, count)
    .map(s=>({...s, lesson: lesson.title}));
  startNceQuiz();
};

// 自选句子加载
document.getElementById("nce-load-sentences").onclick = ()=>{
  const lessonId = Number(document.getElementById("nce-select-lesson").value);
  const lesson = nceDB.find(l=>l.id === lessonId);
  const listWrap = document.getElementById("nce-sentence-list");
  listWrap.innerHTML = "";
  listWrap.classList.remove("hidden");

  lesson.sentences.forEach((s, idx)=>{
    const div = document.createElement("div");
    div.className = "sentence-item";
    div.innerHTML = `
      <input type="checkbox" value="${idx}" class="nce-sentence-check">
      <div class="sentence-text">
        <div class="en">${s.en}</div>
        <div class="cn">${s.cn}</div>
      </div>
    `;
    listWrap.appendChild(div);
  });

  document.getElementById("nce-start-select").disabled = false;
};

// 清空勾选
document.getElementById("nce-clear-select").onclick = ()=>{
  document.querySelectorAll(".nce-sentence-check").forEach(cb=>cb.checked=false);
};

// 自选模式开始
document.getElementById("nce-start-select").onclick = ()=>{
  const lessonId = Number(document.getElementById("nce-select-lesson").value);
  const lesson = nceDB.find(l=>l.id === lessonId);
  const checked = document.querySelectorAll(".nce-sentence-check:checked");
  
  if(checked.length === 0){
    alert("请至少勾选一个句子！");
    return;
  }

  nceQuizList = Array.from(checked).map(cb=>{
    const idx = Number(cb.value);
    return {...lesson.sentences[idx], lesson: lesson.title};
  });
  // 开始答题后收起句子列表
  document.getElementById("nce-sentence-list").classList.add("hidden");
  startNceQuiz();
};

// 开始答题
function startNceQuiz(){
  nceCurrentIndex = 0;
  nceRightCount = 0;
  nceWrongList = [];
  
  document.getElementById("nce-quiz-area").classList.remove("hidden");
  document.getElementById("nce-stat-area").classList.add("hidden");
  document.getElementById("nce-total-num").textContent = nceQuizList.length;
  
  loadNceQuestion();
}

// 加载当前题目
function loadNceQuestion(){
  const item = nceQuizList[nceCurrentIndex];
  document.getElementById("nce-current-num").textContent = nceCurrentIndex + 1;
  document.getElementById("nce-cn-text").textContent = item.cn;
  document.getElementById("nce-answer-input").value = "";
  document.getElementById("nce-correct-ans").classList.add("hidden");
  document.getElementById("nce-next-btn").disabled = true;
  document.getElementById("nce-answer-input").focus();
}

// 批改按钮
document.getElementById("nce-check-btn").onclick = ()=>{
  const userAns = document.getElementById("nce-answer-input").value;
  const correctAns = nceQuizList[nceCurrentIndex].en;
  const result = analyzeErrors(correctAns, userAns);
  
  const ansDiv = document.getElementById("nce-correct-ans");
  ansDiv.classList.remove("hidden");
  ansDiv.innerHTML = `
    <div class="ans-block"><span class="ans-label">你的答案：</span>${result.userHTML}</div>
    <div class="ans-block"><span class="ans-label">正确答案：</span>${result.correctHTML}</div>
    <div class="error-detail">
      错误统计：拼写错误 ${result.stats.spellError} 处 | 多余单词 ${result.stats.extra} 处 | 
      缺失单词 ${result.stats.missing} 处 | 顺序错误 ${result.stats.orderError} 处
    </div>
  `;

  if(result.stats.isCorrect){
    nceRightCount++;
  }else{
    nceWrongList.push({
      cn: nceQuizList[nceCurrentIndex].cn,
      user: userAns,
      correct: correctAns,
      stats: result.stats
    });
  }

  document.getElementById("nce-next-btn").disabled = false;
};

// 下一题
document.getElementById("nce-next-btn").onclick = ()=>{
  if(nceCurrentIndex < nceQuizList.length - 1){
    nceCurrentIndex++;
    loadNceQuestion();
  }else{
    showNceStat();
  }
};

// 查看统计
document.getElementById("nce-show-stat").onclick = showNceStat;

function showNceStat(){
  document.getElementById("nce-stat-area").classList.remove("hidden");
  document.getElementById("nce-stat-total").textContent = nceQuizList.length;
  document.getElementById("nce-stat-right").textContent = nceRightCount;
  document.getElementById("nce-stat-rate").textContent = 
    nceQuizList.length > 0 ? ((nceRightCount / nceQuizList.length) * 100).toFixed(1) + "%" : "0%";

  const wrongWrap = document.getElementById("nce-wrong-list");
  if(nceWrongList.length === 0){
    wrongWrap.innerHTML = "<p>太棒了，全部正确！</p>";
  }else{
    wrongWrap.innerHTML = "";
    nceWrongList.forEach(item=>{
      const result = analyzeErrors(item.correct, item.user);
      const div = document.createElement("div");
      div.className = "wrong-item";
      div.innerHTML = `
        <p><strong>题目：</strong>${item.cn}</p>
        <div class="ans-block"><span class="ans-label">你的答案：</span>${result.userHTML}</div>
        <div class="ans-block"><span class="ans-label">正确答案：</span>${result.correctHTML}</div>
      `;
      wrongWrap.appendChild(div);
    });
  }
}

// 退出答题
document.getElementById("nce-quit-quiz").onclick = ()=>{
  if(confirm("确定要退出答题吗？当前进度将丢失。")){
    document.getElementById("nce-quiz-area").classList.add("hidden");
    document.getElementById("nce-stat-area").classList.add("hidden");
  }
};

// 初始化下拉选择框
function initUnitSelects(){
  const unitSelect = document.getElementById("unit-unit-select");
  const selectUnit = document.getElementById("unit-select-unit");
  if(unitSelect.options.length > 0) return;

  const units = [...new Set(unitTranslationDB.map(item=>item.unit))];
  units.forEach(unit=>{
    const opt1 = document.createElement("option");
    opt1.value = unit;
    opt1.textContent = unit;
    unitSelect.appendChild(opt1);

    const opt2 = document.createElement("option");
    opt2.value = unit;
    opt2.textContent = unit;
    selectUnit.appendChild(opt2);
  });
}

// ===================== Tab切换 + 全局初始化 =====================
document.querySelectorAll(".tab-btn").forEach(btn=>{

    const tabId = btn.dataset.tab;
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("show"));
    document.getElementById(tabId).classList.add("show");
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

  }
});
