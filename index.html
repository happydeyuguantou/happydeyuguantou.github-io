<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>公开留言板</title>
<!-- 自动跳转到你的项目路径 ✅ 这是我加的 -->
<script>
if (location.pathname === "/" || location.pathname === "/index.html") {
  location.replace("/happydeyuguantou.github-io/");
}
</script>

<style>
body { max-width: 700px; margin: 20px auto; padding: 10px; }
textarea { width: 100%; box-sizing: border-box; padding: 8px; height: 80px; }
button { padding: 8px 16px; margin-top: 8px; }
.message { padding: 10px; border-bottom: 1px solid #eee; }
.time { color: #666; font-size: 12px; }
</style>
</head>
<body>

<h2>公开留言板</h2>
<textarea id="msg" placeholder="在这里输入留言..."></textarea>
<br>
<button onclick="submitMessage()">发布留言</button>
<p id="status"></p>

<hr>

<h3>最新留言</h3>
<div id="messageList">加载中...</div>

<script>
const MAX_MESSAGES = 50;
const API_URL = "https://jsonblob.com/api/jsonBlob";
const BLOB_ID = "1321154211111111111";

async function loadMessages() {
  try {
    let res = await fetch(`${API_URL}/${BLOB_ID}`);
    let msgs = await res.json();
    showMessages(msgs || []);
  } catch (e) {
    document.getElementById("messageList").innerText = "暂无留言，来抢沙发吧！";
  }
}

function showMessages(msgs) {
  let html = "";
  msgs.forEach(m => {
    html += `
    <div class="message">
      <div class="time">${m.time}</div>
      <div>${m.content}</div>
    </div>`;
  });
  document.getElementById("messageList").innerHTML = html;
}

async function submitMessage() {
  let content = document.getElementById("msg").value.trim();
  if (!content) return alert("请输入内容");
  
  document.getElementById("status").innerText = "正在提交...";
  
  try {
    let res = await fetch(`${API_URL}/${BLOB_ID}`);
    let msgs = await res.json();
    
    msgs.push({
      content: content,
      time: new Date().toLocaleString()
    });
    
    if (msgs.length > MAX_MESSAGES) {
      msgs = msgs.slice(-MAX_MESSAGES);
    }
    
    await fetch(`${API_URL}/${BLOB_ID}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(msgs)
    });
    
    document.getElementById("status").innerText = "提交成功！";
    document.getElementById("msg").value = "";
    loadMessages();
  } catch (e) {
    document.getElementById("status").innerText = "提交失败，请稍后再试";
  }
}

loadMessages();
</script>

</body>
</html>
