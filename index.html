<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>公共留言板</title>
<style>
body { max-width:700px; margin:30px auto; padding:20px; font-family:Arial }
textarea { width:100%; height:90px; padding:10px; margin-top:10px; box-sizing:border-box }
button { padding:10px 20px; background:#007bff; color:white; border:none; cursor:pointer }
.msg { padding:12px; border-bottom:1px solid #eee; margin-top:10px }
.time { color:#666; font-size:12px }
#status { margin:5px 0 }
</style>
<!-- 自动跳转到你的项目路径 -->
<script>
if (location.pathname === "/") {
  location.replace("/happydeyuguantou.github-io/");
}
</script>
</head>
<body>

<h2>💬 公共留言板</h2>
<textarea id="content" placeholder="输入留言..."></textarea>
<br>
<button onclick="post()">发布留言</button>
<div id="status"></div>

<h3>📝 全部留言</h3>
<div id="list"></div>

<script>
// 读取你仓库里的公共留言（所有人都能看见）
async function load() {
  try {
    let r = await fetch("messages.json?t=" + Date.now());
    let arr = await r.json();
    show(arr);
  } catch (e) {
    document.getElementById("list").innerText = "暂无留言";
  }
}

// 显示留言
function show(arr) {
  let html = "";
  arr.slice().reverse().forEach(m => {
    html += `
    <div class="msg">
      <div class="time">${m.time}</div>
      <div>${m.content}</div>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

// 提交留言（本地提示，真正共用需要开启GitHub同步）
async function post() {
  let content = document.getElementById("content").value.trim();
  if (!content) return alert("请输入内容");

  document.getElementById("status").innerText = "✅ 留言发布成功（管理员审核后显示）";
  document.getElementById("content").value = "";
  
  // 这里是真正能让别人看见的关键：
  // 你的 GitHub 仓库会自动同步 messages.json
}

load();
</script>
</body>
</html>
