<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>公共留言板</title>
<style>
body { max-width: 700px; margin: 20px auto; padding: 10px; }
#msg { width: 100%; box-sizing: border-box; padding: 8px; }
button { padding: 8px 16px; margin-top: 8px; }
.message { padding: 10px; border-bottom: 1px solid #eee; }
.time { color: #666; font-size: 12px; }
</style>
</head>
<body>

<h2>公共留言板</h2>
<textarea id="msg" rows="4" placeholder="在这里输入你想说的话..."></textarea>
<br>
<button onclick="submitMessage()">发布留言</button>

<hr>

<h3>最新留言</h3>
<div id="messageList">加载中...</div>

<script>
const MAX_MESSAGES = 50;
const REPO = "happydeyuguantou/happydeyuguantou.github.io";

async function loadMessages() {
  try {
    let res = await fetch(`/messages.json?t=${Date.now()}`);
    let msgs = await res.json();
    showMessages(msgs || []);
  } catch (e) {
    document.getElementById("messageList").innerText = "暂无留言，来抢沙发吧！";
  }
}

function showMessages(msgs) {
  let html = "";
  msgs.forEach(m => {
    html += `
    <div class="message">
      <div class="time">${m.time}</div>
      <div>${m.content}</div>
    </div>`;
  });
  document.getElementById("messageList").innerHTML = html;
}

function submitMessage() {
  let content = document.getElementById("msg").value.trim();
  if (!content) return alert("请输入内容");
  
  const title = encodeURIComponent("新留言");
  const body = encodeURIComponent(content);
  const url = `https://github.com/${REPO}/issues/new?title=${title}&body=${body}`;
  
  if (confirm("点击确定将跳转到 GitHub 发布留言（需登录GitHub账号）")) {
    window.open(url, "_blank");
  }
}

loadMessages();
</script>

</body>
</html>
