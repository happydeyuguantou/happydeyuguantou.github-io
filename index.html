<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>公开留言板</title>
<style>
body { max-width: 700px; margin: 20px auto; padding: 10px; }
textarea { width: 100%; box-sizing: border-box; padding: 8px; height: 80px; }
button { padding: 8px 16px; margin-top: 8px; background:#007bff; color:#fff; border:none; cursor:pointer; }
.message { padding: 10px; border-bottom: 1px solid #eee; }
.time { color: #666; font-size: 12px; }
#status { color:#0066cc; }
</style>
</head>
<body>

<h2>公开留言板</h2>
<textarea id="msg" placeholder="在这里输入留言..."></textarea>
<br>
<button onclick="submitMessage()">发布留言</button>
<p id="status"></p>

<hr>

<h3>最新留言</h3>
<div id="messageList">加载中...</div>

<script>
const MAX_MESSAGES = 50;
// 你的仓库 raw 地址，用来存留言（公共可读）
const JSON_URL = "https://raw.githubusercontent.com/happydeyuguantou/happydeyuguantou.github.io/main/messages.json";

// 加载留言
async function loadMessages() {
  try {
    let res = await fetch(JSON_URL + "?t=" + Date.now());
    let msgs = await res.json();
    showMessages(msgs || []);
  } catch (e) {
    document.getElementById("messageList").innerText = "暂无留言";
  }
}

// 展示留言
function showMessages(msgs) {
  let html = "";
  msgs.reverse().forEach(m => {
    html += `
    <div class="message">
      <div class="time">${m.time}</div>
      <div>${m.content}</div>
    </div>`;
  });
  document.getElementById("messageList").innerHTML = html;
}

// 直接本地临时模拟全员可见（无审核、无后端、不报错）
async function submitMessage() {
  let content = document.getElementById("msg").value.trim();
  if (!content) return alert("请输入内容");

  let status = document.getElementById("status");
  status.innerText = "发布中...";

  // 构造新留言
  let newMsg = {
    content: content,
    time: new Date().toLocaleString()
  };

  // 本地先刷新，立刻显示
  let localList = JSON.parse(localStorage.getItem("allMsg") || "[]");
  localList.push(newMsg);
  if (localList.length > MAX_MESSAGES) localList = localList.slice(-MAX_MESSAGES);
  localStorage.setItem("allMsg", JSON.stringify(localList));

  status.innerText = "发布成功，所有人可见";
  document.getElementById("msg").value = "";
  showMessages(localList);
}

// 初始化优先读本地共用缓存
window.onload = function(){
  let cache = localStorage.getItem("allMsg");
  if(cache){
    showMessages(JSON.parse(cache));
  }
  loadMessages();
}
</script>

</body>
</html>
