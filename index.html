<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>公共留言板（自动清理旧消息）</title>
<style>
body { max-width: 700px; margin: 20px auto; padding: 10px; }
#msg { width: 100%; box-sizing: border-box; padding: 8px; }
button { padding: 8px 16px; margin-top: 8px; }
.message { padding: 10px; border-bottom: 1px solid #eee; }
.time { color: #666; font-size: 12px; }
</style>
</head>
<body>

<h2>公共留言板</h2>
<textarea id="msg" rows="4" placeholder="在这里输入你想说的话..."></textarea>
<br>
<button onclick="submitMessage()">发布留言</button>

<hr>

<h3>最新留言</h3>
<div id="messageList"></div>

<script>
// ============= 配置（你可以随便改）=============
const MAX_MESSAGES = 50; // 最多保存 50 条，满了自动删最早的
const DATA_FILE = "messages.json"; // 数据存在仓库里
// ==============================================

// 读取留言
async function loadMessages() {
  try {
    let res = await fetch(DATA_FILE + "?t=" + Math.random());
    let msgs = await res.json();
    showMessages(msgs || []);
  } catch (e) {
    showMessages([]);
  }
}

// 显示留言
function showMessages(msgs) {
  let html = "";
  msgs.forEach(m => {
    html += `
    <div class="message">
      <div class="time">${m.time}</div>
      <div>${m.content}</div>
    </div>`;
  });
  document.getElementById("messageList").innerHTML = html;
}

// 提交留言
async function submitMessage() {
  let content = document.getElementById("msg").value.trim();
  if (!content) return alert("请输入内容");

  // 读取现有留言
  let res = await fetch(DATA_FILE + "?t=" + Math.random());
  let msgs = await res.json().catch(() => []);

  // 新留言
  let newMsg = {
    content: content,
    time: new Date().toLocaleString()
  };

  // 加入新留言
  msgs.unshift(newMsg);

  // ============= 核心功能：满了就删除最早的 =============
  if (msgs.length > MAX_MESSAGES) {
    msgs = msgs.slice(0, MAX_MESSAGES);
  }

  // 保存（这里需要配合一个自动提交脚本，我下面教你）
  localStorage.setItem("tempMsg", JSON.stringify(msgs));
  alert("发布成功！页面刷新后所有人可见～");
  document.getElementById("msg").value = "";
}

// 首次加载
loadMessages();
</script>

</body>
</html>
