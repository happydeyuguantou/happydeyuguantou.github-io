<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wonder & SSP & 新概念刷题工具</title>
  <style>
    * {box-sizing: border-box; font-family: system-ui, sans-serif;}
    body {max-width: 1200px; margin: 0 auto; padding: 20px; background: #f7f9fc;}
    .tab-wrap {margin-bottom: 20px;}
    .tab-btn {padding: 10px 24px; font-size: 16px; border: none; cursor: pointer; background: #e2e8f0;}
    .tab-btn.active {background: #2563eb; color: white;}
    .panel {display: none; background: white; padding: 24px; border-radius: 10px; box-shadow: 0 2px 12px #00000012;}
    .panel.show {display: block;}
    .control-row {margin-bottom: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;}
    input[type="number"], select {padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; width: 140px;}
    button {padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;}
    button.blue {background: #3b82f6; color:#fff;}
    button.secondary {background: #64748b; color:#fff;}
    button.danger {background: #ef4444; color:#fff;}
    button.success {background: #10b981; color:#fff;}
    button:disabled {background: #cbd5e1; color: #64748b; cursor: not-allowed;}
    .question-item {border: 1px solid #e2e8f0; padding: 14px; border-radius: 8px; margin-bottom: 12px;}
    .blank-input {width: 180px; padding: 6px 8px; margin: 0 6px; border: 1px solid #94a3b8; border-radius: 4px;}
    .wrong {background: #fee2e2; border: 1px solid #f87171;}
    .correct-ans {color: #16a34a; font-weight: bold; margin-left: 8px;}
    .chinese-hint {color: #6b7280; font-size: 14px;}
    .word-box {background: #f1f5f9; padding: 10px; border-radius: 6px; margin: 8px 0;}
    .stat-box {margin-top: 20px; padding: 16px; background: #dbeafe; border-radius: 8px; font-size: 18px;}
    .journal-checklist {display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; max-height: 200px; overflow-y: auto; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;}
    .journal-item {display: flex; align-items: center; gap: 4px; width: 180px;}
    .hidden {display: none;}
    .ssp-title {margin-top: 0;}
    #range-inputs input {width: 80px;}

    /* 新概念默写新增样式 */
    .nce-sentence-list {max-height: 420px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin: 10px 0; background: #fafbfc;}
    .nce-sentence-item {padding: 10px 0; border-bottom: 1px solid #eef2f7; display: flex; gap: 10px; align-items: flex-start; line-height: 1.6;}
    .nce-sentence-item:last-child {border-bottom: none;}
    .nce-sentence-item input {margin-top: 5px; flex-shrink: 0;}
    .nce-sentence-item .sentence-text {flex: 1;}
    .nce-sentence-item .en {color: #1e293b;}
    .nce-sentence-item .cn {color: #64748b; font-size: 14px; margin-top: 4px;}
    #nce-answer-input {width: 100%; padding: 10px 12px; font-size: 16px; margin: 12px 0;}
    .wrong-item {padding: 10px; background: #fef2f2; border-radius: 6px; margin-bottom: 8px; font-size: 15px;}
    .wrong-item .lesson-tag {display: inline-block; padding: 2px 8px; background: #ef4444; color: white; border-radius: 4px; font-size: 13px; margin-right: 8px;}
    .nce-mode-panel {margin-bottom: 16px;}
  </style>
</head>
<body>
  <h1>Wonder词汇 / SSP选词 / 新概念默写</h1>
  <div class="tab-wrap">
    <button class="tab-btn active" data-tab="tab-wonder">Wonder词汇填空</button>
    <button class="tab-btn" data-tab="tab-ssp">SSP语法选词</button>
    <button class="tab-btn" data-tab="tab-nce">新概念课文默写</button>
  </div>

  <!-- Wonder页面 -->
  <div id="tab-wonder" class="panel show">
    <div class="control-row">
      <label><input type="radio" name="wonder-mode" value="random" checked> 全题库随机</label>
      <label><input type="radio" name="wonder-mode" value="range"> 指定题号范围</label>
      <span id="range-inputs" class="hidden">
        <label>起始：</label>
        <input id="wonder-start" type="number" min="1" max="102" value="1">
        <label>结束：</label>
        <input id="wonder-end" type="number" min="1" max="102" value="20">
      </span>
      <label>出题数量：</label>
      <input id="wonder-count" type="number" min="1" max="102" value="10">
      <label><input type="checkbox" id="show-chinese"> 显示中文释义括号</label>
      <label><input type="checkbox" id="show-first-letter"> 显示首字母提示</label>
      <button class="blue" id="gen-wonder">生成题目</button>
      <button class="secondary" id="check-wonder">批改全部</button>
      <button class="danger" id="reset-wonder">重置</button>
    </div>
    <div id="wonder-qs"></div>
  </div>

  <!-- SSP页面 -->
  <div id="tab-ssp" class="panel">
    <div class="control-row">
      <label>出题模式：</label>
      <label><input type="radio" name="ssp-mode" value="original" checked> 期刊原组（10题/组）</label>
      <label><input type="radio" name="ssp-mode" value="custom"> 自定义组</label>
      <span id="custom-ssp-settings" class="hidden">
        <label>每组题数：</label>
        <input id="ssp-custom-per" type="number" min="1" value="10">
        <label>组数：</label>
        <input id="ssp-custom-groups" type="number" min="1" value="2">
      </span>
    </div>
    <div class="control-row">
      <label>选择期刊：</label>
      <div class="journal-checklist" id="journal-list"></div>
      <button class="blue" id="select-all-journals">一键全选</button>
      <button class="success" id="start-ssp">开始答题</button>
      <button class="secondary" id="check-ssp">批改本套</button>
      <button class="blue" id="next-ssp" disabled>下一套</button>
      <button class="danger" id="reset-ssp">重置全部</button>
    </div>
    <div id="ssp-current-set"></div>
    <div class="stat-box hidden" id="ssp-stat"></div>
  </div>

  <!-- 新概念默写页面 -->
  <div id="tab-nce" class="panel">
    <div class="control-row">
      <label><input type="radio" name="nce-mode" value="random" checked> 全范围随机抽题</label>
      <label><input type="radio" name="nce-mode" value="lesson"> 指定课文抽题</label>
      <label><input type="radio" name="nce-mode" value="select"> 自选句子答题</label>
    </div>

    <!-- 随机抽题模式 -->
    <div id="nce-random-panel" class="nce-mode-panel">
      <div class="control-row">
        <label>出题数量：</label>
        <input id="nce-random-count" type="number" min="1" value="10">
        <button class="blue" id="nce-start-random">开始答题</button>
      </div>
    </div>

    <!-- 指定课文模式 -->
    <div id="nce-lesson-panel" class="nce-mode-panel hidden">
      <div class="control-row">
        <label>选择课文：</label>
        <select id="nce-lesson-select"></select>
        <label>出题数量：</label>
        <input id="nce-lesson-count" type="number" min="1" value="5">
        <button class="blue" id="nce-start-lesson">开始答题</button>
      </div>
    </div>

    <!-- 自选句子模式 -->
    <div id="nce-select-panel" class="nce-mode-panel hidden">
      <div class="control-row">
        <label>选择课文：</label>
        <select id="nce-select-lesson"></select>
        <button class="secondary" id="nce-load-sentences">加载句子列表</button>
        <button class="blue" id="nce-start-select" disabled>开始答题</button>
        <button class="danger" id="nce-clear-select">清空勾选</button>
      </div>
      <div id="nce-sentence-list" class="nce-sentence-list hidden"></div>
    </div>

    <!-- 答题区 -->
    <div id="nce-quiz-area" class="hidden">
      <div class="control-row">
        <span>当前第 <strong id="nce-current-num">1</strong> / <span id="nce-total-num">10</span> 题</span>
        <button class="secondary" id="nce-show-stat">查看统计与错题</button>
        <button class="danger" id="nce-quit-quiz">退出答题</button>
      </div>
      <div class="question-item" id="nce-quiz-item">
        <p><strong>中文译文：</strong></p>
        <p id="nce-cn-text" style="font-size: 17px; line-height: 1.7;"></p>
        <input class="blank-input" id="nce-answer-input" placeholder="请输入英文原句">
        <div style="margin-top: 8px;">
          <button class="blue" id="nce-check-btn">批改</button>
          <button class="success" id="nce-next-btn" disabled>下一题</button>
        </div>
        <p id="nce-correct-ans" class="correct-ans hidden" style="margin-top: 10px;"></p>
      </div>
    </div>

    <!-- 统计与错题区 -->
    <div id="nce-stat-area" class="stat-box hidden">
      <h3 style="margin-top: 0;">本次答题统计</h3>
      <p>总题数：<span id="nce-stat-total">0</span></p>
      <p>正确数：<span id="nce-stat-right">0</span></p>
      <p>正确率：<span id="nce-stat-rate">0%</span></p>
      <h4 style="margin-bottom: 8px;">错题列表</h4>
      <div id="nce-wrong-list"></div>
    </div>
  </div>

// ===================== 全局变量 =====================
let currentWonderQs = [];
let sspPool = []; // 每套题格式：{journalId, questions:[], box:[]}
let currentSspSet = null;
let sspDoneCount = 0;
let sspWrongTotal = 0;
let sspTotalQ = 0; // 累计完成总题数
const showChineseKey = "wonderShowChinese";
const showFirstLetterKey = "wonderShowFirstLetter";
const showChineseCheckbox = document.getElementById("show-chinese");
const showFirstLetterCheckbox = document.getElementById("show-first-letter");
const nextSspBtn = document.getElementById("next-ssp");
const modeRadios = document.querySelectorAll('input[name="wonder-mode"]');
const rangeInputs = document.getElementById("range-inputs");
const wonderStartInput = document.getElementById("wonder-start");
const wonderEndInput = document.getElementById("wonder-end");

// 新概念全局变量
let nceQuizList = [];
let nceCurrentIndex = 0;
let nceRightCount = 0;
let nceWrongList = [];

// ===================== Wonder 逻辑 =====================
function loadWonderSettings(){
  const savedCn = localStorage.getItem(showChineseKey);
  showChineseCheckbox.checked = (savedCn === "true");
  const savedFl = localStorage.getItem(showFirstLetterKey);
  showFirstLetterCheckbox.checked = (savedFl === "true");
}
loadWonderSettings();

showChineseCheckbox.addEventListener("change", function(){
  localStorage.setItem(showChineseKey, this.checked);
  if(currentWonderQs.length > 0) renderWonder();
});

showFirstLetterCheckbox.addEventListener("change", function(){
  localStorage.setItem(showFirstLetterKey, this.checked);
  if(currentWonderQs.length > 0) renderWonder();
});

modeRadios.forEach(radio=>{
  radio.addEventListener("change", function(){
    if(this.value === "range"){
      rangeInputs.classList.remove("hidden");
    }else{
      rangeInputs.classList.add("hidden");
    }
  });
});

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.onclick = ()=>{
    const tabId = btn.dataset.tab;
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("show"));
    document.getElementById(tabId).classList.add("show");
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    if(tabId==="tab-ssp") renderJournalList();
    if(tabId==="tab-nce") initNceSelects();
  }
});

function renderWonder(){
  const wrap = document.getElementById("wonder-qs");
  wrap.innerHTML = "";
  const showCn = showChineseCheckbox.checked;
  const showFl = showFirstLetterCheckbox.checked;

  const getFirstLetter = (ans) => {
    return ans.split(";").map(part => part.trim().charAt(0)).join(";");
  };

  currentWonderQs.forEach((item,idx)=>{
    let sentence = item.en.replace(/_{2,}/g,"___");
    let hint = showCn ? `(${item.cn})` : "";
    let placeholder = showFl ? `首字母: ${getFirstLetter(item.ans)}` : "填写答案";
    
    let html = `
      <div class="question-item" data-index="${idx}">
        <p>${idx+1}. ${sentence} ${hint}</p>
        <input class="blank-input wonder-in" data-ans="${item.ans}" placeholder="${placeholder}">
        <span class="correct-ans hidden"></span>
      </div>
    `;
    wrap.innerHTML += html;
  });
}

document.getElementById("gen-wonder").onclick = ()=>{
  const num = Number(document.getElementById("wonder-count").value);
  const mode = document.querySelector('input[name="wonder-mode"]:checked').value;
  let pool = [];

  if(mode === "range"){
    const start = Number(wonderStartInput.value);
    const end = Number(wonderEndInput.value);
    if(start < 1 || end > wonderDB.length || start > end){
      alert(`请输入合法的题号范围，有效范围为 1 - ${wonderDB.length}`);
      return;
    }
    const rangeCount = end - start + 1;
    if(num > rangeCount){
      alert(`该范围内共 ${rangeCount} 道题，出题数量不能超过总数`);
      return;
    }
    pool = wonderDB.slice(start - 1, end);
  }else{
    pool = [...wonderDB];
  }

  const shuffled = pool.sort(()=>Math.random()-0.5);
  currentWonderQs = shuffled.slice(0, Math.min(num, pool.length));
  renderWonder();
};

document.getElementById("check-wonder").onclick = ()=>{
  document.querySelectorAll(".wonder-in").forEach(input=>{
    const wrap = input.closest(".question-item");
    const ansSpan = wrap.querySelector(".correct-ans");
    ansSpan.classList.remove("hidden");
    ansSpan.textContent = `标准答案：${input.dataset.ans}`;
    const user = input.value.trim().toLowerCase();
    const cor = input.dataset.ans.toLowerCase();
    if(user !== cor){
      wrap.classList.add("wrong");
      input.style.borderColor = "#ef4444";
    }else{
      wrap.classList.remove("wrong");
      input.style.borderColor = "#16a34a";
    }
  });
};

document.getElementById("reset-wonder").onclick = ()=>{
  currentWonderQs = [];
  document.getElementById("wonder-qs").innerHTML = "";
};

// ===================== SSP 逻辑 =====================
// 渲染期刊列表
function renderJournalList(){
  const listWrap = document.getElementById("journal-list");
  listWrap.innerHTML = "";
  // 提取去重后的期刊ID
  const journalIds = [...new Set(sspQuestions.map(q=>q.journalId))];
  journalIds.forEach(jId=>{
    const div = document.createElement("div");
    div.className = "journal-item";
    const inputId = `j-${jId}`;
    div.innerHTML = `<input type="checkbox" value="${jId}" id="${inputId}"> <label for="${inputId}">${jId}</label>`;
    listWrap.appendChild(div);
  });
}

// 模式切换显示自定义设置
document.querySelectorAll('input[name="ssp-mode"]').forEach(radio=>{
  radio.addEventListener("change", function(){
    const customSettings = document.getElementById("custom-ssp-settings");
    customSettings.classList.toggle("hidden", this.value !== "custom");
  });
});

document.getElementById("select-all-journals").onclick = ()=>{
  document.querySelectorAll(".journal-item input").forEach(cb=>cb.checked=true);
};

// 开始答题
document.getElementById("start-ssp").onclick = ()=>{
  sspPool = [];
  sspDoneCount = 0;
  sspWrongTotal = 0;
  sspTotalQ = 0;
  document.getElementById("ssp-stat").classList.add("hidden");

  const checkedBoxes = document.querySelectorAll(".journal-item input:checked");
  if(checkedBoxes.length === 0){
    alert("请先勾选至少一套期刊再开始答题！");
    return;
  }
  const selectedJournals = Array.from(checkedBoxes).map(cb=>cb.value);
  const mode = document.querySelector('input[name="ssp-mode"]:checked').value;

  if(mode === "original"){
    // 期刊原组模式：按原PDF分组，10题/组
    selectedJournals.forEach(jId=>{
      const journalQs = sspQuestions.filter(q=>q.journalId === jId);
      const set0 = journalQs.filter(q=>q.setId === 0);
      const set1 = journalQs.filter(q=>q.setId === 1);
      
      if(set0.length > 0){
        sspPool.push({
          journalId: `${jId} 第1组`,
          questions: set0,
          box: set0.map(q=>q.root)
        });
      }
      if(set1.length > 0){
        sspPool.push({
          journalId: `${jId} 第2组`,
          questions: set1,
          box: set1.map(q=>q.root)
        });
      }
    });
  }else{
    // 自定义组模式：随机抽题分组
    const perGroup = Number(document.getElementById("ssp-custom-per").value);
    const groupCount = Number(document.getElementById("ssp-custom-groups").value);
    const allAvailable = sspQuestions.filter(q=>selectedJournals.includes(q.journalId));
    const totalNeed = perGroup * groupCount;

    if(totalNeed > allAvailable.length){
      alert(`选中期刊共 ${allAvailable.length} 道题，无法生成 ${groupCount} 组、每组 ${perGroup} 题（共需 ${totalNeed} 题）。请减少组数或每组题数。`);
      return;
    }

    // 打乱并分组
    const shuffled = [...allAvailable].sort(()=>Math.random()-0.5);
    for(let i=0; i<groupCount; i++){
      const start = i * perGroup;
      const groupQs = shuffled.slice(start, start + perGroup);
      sspPool.push({
        journalId: `自定义第${i+1}组`,
        questions: groupQs,
        box: groupQs.map(q=>q.root)
      });
    }
  }

  if(sspPool.length === 0){
    alert("未生成可用套题！");
    return;
  }

  // 打乱套题顺序
  sspPool.sort(()=>Math.random()-0.5);
  nextSspSet();
};

function nextSspSet(){
  if(sspPool.length === 0){
    document.getElementById("ssp-current-set").innerHTML = "<p>所有选中套题已完成！</p>";
    showSspStat();
    nextSspBtn.disabled = true;
    return;
  }
  const randomIndex = Math.floor(Math.random() * sspPool.length);
  currentSspSet = sspPool.splice(randomIndex, 1)[0];
  renderSspSet();
}

function renderSspSet(){
  const wrap = document.getElementById("ssp-current-set");
  // 词库随机打乱
  const shuffledBox = [...currentSspSet.box].sort(() => Math.random() - 0.5);

  let html = `<h3 class="ssp-title">当前：${currentSspSet.journalId}</h3>`;
  html += `<div class="word-box">词库：${shuffledBox.join(" / ")}</div>`;
  
  currentSspSet.questions.forEach((q,idx)=>{
    html += `<div class="question-item">
      <p>${idx+1}. ${q.en.replace("____","___")}
        <input class="blank-input ssp-in" data-ans="${q.ans}" placeholder="填写答案">
        <span class="correct-ans hidden"></span>
      </p>
    </div>`;
  });
  wrap.innerHTML = html;
  nextSspBtn.disabled = true;
}

document.getElementById("check-ssp").onclick = ()=>{
  let wrongNum = 0;
  const normalize = str => str.trim().toLowerCase().replace(/\s+/g, ' ');

  document.querySelectorAll(".ssp-in").forEach(input=>{
    const wrap = input.closest(".question-item");
    const ansSpan = wrap.querySelector(".correct-ans");
    ansSpan.classList.remove("hidden");
    ansSpan.textContent = `标准答案：${input.dataset.ans}`;
    
    const userAns = normalize(input.value);
    const realAns = normalize(input.dataset.ans);
    
    if(userAns !== realAns){
      wrap.classList.add("wrong");
      input.style.borderColor = "#ef4444";
      wrongNum++;
    }else{
      wrap.classList.remove("wrong");
      input.style.borderColor = "#16a34a";
    }
  });
  sspWrongTotal += wrongNum;
  sspDoneCount++;
  sspTotalQ += currentSspSet.questions.length;
  nextSspBtn.disabled = false;
};

document.getElementById("next-ssp").onclick = nextSspSet;

function showSspStat(){
  const statBox = document.getElementById("ssp-stat");
  statBox.classList.remove("hidden");
  const right = sspTotalQ - sspWrongTotal;
  const rate = sspTotalQ === 0 ? "0%" : ((right/sspTotalQ)*100).toFixed(1)+"%";
  statBox.innerHTML = `
    <h3>刷题统计</h3>
    <p>完成套数：${sspDoneCount} 套</p>
    <p>总题数：${sspTotalQ} 道</p>
    <p>总错题：${sspWrongTotal} 道</p>
    <p>正确率：${rate}</p>
  `;
}

document.getElementById("reset-ssp").onclick = ()=>{
  sspPool = [];
  sspDoneCount=0;
  sspWrongTotal=0;
  sspTotalQ=0;
  document.getElementById("ssp-current-set").innerHTML = "";
  document.getElementById("ssp-stat").classList.add("hidden");
  document.querySelectorAll(".journal-item input").forEach(cb=>cb.checked=false);
  nextSspBtn.disabled = true;
};

// 初始化课文下拉选项
function initNceSelects(){
  const selects = ["nce-lesson-select", "nce-select-lesson"];
  selects.forEach(id=>{
    const sel = document.getElementById(id);
    if(sel.options.length > 0) return;
    nceDB.forEach(lesson=>{
      const opt = document.createElement("option");
      opt.value = lesson.id;
      opt.textContent = lesson.title;
      sel.appendChild(opt);
    });
  });
}

// 模式切换
document.querySelectorAll('input[name="nce-mode"]').forEach(radio=>{
  radio.addEventListener("change", function(){
    document.querySelectorAll(".nce-mode-panel").forEach(p=>p.classList.add("hidden"));
    document.getElementById(`nce-${this.value}-panel`).classList.remove("hidden");
  });
});

// 句子归一化：忽略大小写、空格、所有标点符号
function normalizeSentence(str){
  return str.trim()
    .toLowerCase()
    .replace(/\s+/g, ' ')
    .replace(/[^\w\s]/g, '');
}

// 开始答题通用初始化
function startNceQuiz(list){
  nceQuizList = list.sort(()=>Math.random()-0.5);
  nceCurrentIndex = 0;
  nceRightCount = 0;
  nceWrongList = [];
  document.getElementById("nce-total-num").textContent = nceQuizList.length;
  document.getElementById("nce-quiz-area").classList.remove("hidden");
  document.getElementById("nce-stat-area").classList.add("hidden");
  renderNceQuestion();
}

// 渲染当前题目
function renderNceQuestion(){
  const item = nceQuizList[nceCurrentIndex];
  document.getElementById("nce-current-num").textContent = nceCurrentIndex + 1;
  document.getElementById("nce-cn-text").textContent = item.cn;
  document.getElementById("nce-answer-input").value = "";
  document.getElementById("nce-correct-ans").classList.add("hidden");
  document.getElementById("nce-quiz-item").classList.remove("wrong");
  document.getElementById("nce-check-btn").disabled = false;
  document.getElementById("nce-next-btn").disabled = true;
  document.getElementById("nce-answer-input").focus();
}

// 批改
document.getElementById("nce-check-btn").onclick = ()=>{
  const item = nceQuizList[nceCurrentIndex];
  const userInput = document.getElementById("nce-answer-input").value;
  const correctAns = item.en;
  const ansEl = document.getElementById("nce-correct-ans");
  const quizItem = document.getElementById("nce-quiz-item");

  ansEl.classList.remove("hidden");
  ansEl.textContent = `正确答案：${correctAns}`;
  document.getElementById("nce-check-btn").disabled = true;
  document.getElementById("nce-next-btn").disabled = false;

  if(normalizeSentence(userInput) === normalizeSentence(correctAns)){
    nceRightCount++;
    quizItem.classList.remove("wrong");
    ansEl.style.color = "#16a34a";
  }else{
    quizItem.classList.add("wrong");
    ansEl.style.color = "#dc2626";
    nceWrongList.push({
      lessonId: item.lessonId,
      lessonTitle: item.lessonTitle,
      cn: item.cn,
      en: item.en,
      userAns: userInput
    });
  }
};

// 下一题
document.getElementById("nce-next-btn").onclick = ()=>{
  nceCurrentIndex++;
  if(nceCurrentIndex >= nceQuizList.length){
    alert("本次答题已完成！");
    showNceStat();
    return;
  }
  renderNceQuestion();
};

// 显示统计
function showNceStat(){
  const total = nceQuizList.length;
  const rate = total === 0 ? "0%" : ((nceRightCount / total) * 100).toFixed(1) + "%";
  document.getElementById("nce-stat-total").textContent = total;
  document.getElementById("nce-stat-right").textContent = nceRightCount;
  document.getElementById("nce-stat-rate").textContent = rate;

  const wrongListEl = document.getElementById("nce-wrong-list");
  wrongListEl.innerHTML = "";
  if(nceWrongList.length === 0){
    wrongListEl.innerHTML = "<p style='color:#16a34a;'>太棒了，全部正确！</p>";
  }else{
    nceWrongList.forEach(item=>{
      const div = document.createElement("div");
      div.className = "wrong-item";
      div.innerHTML = `
        <span class="lesson-tag">Lesson ${item.lessonId}</span>
        <p><strong>译文：</strong>${item.cn}</p>
        <p><strong>你的答案：</strong>${item.userAns || "(空)"}</p>
        <p><strong>正确答案：</strong>${item.en}</p>
      `;
      wrongListEl.appendChild(div);
    });
  }
  document.getElementById("nce-stat-area").classList.remove("hidden");
}

document.getElementById("nce-show-stat").onclick = showNceStat;

// 退出答题
document.getElementById("nce-quit-quiz").onclick = ()=>{
  if(confirm("确定退出本次答题吗？进度将不会保存。")){
    document.getElementById("nce-quiz-area").classList.add("hidden");
    document.getElementById("nce-stat-area").classList.add("hidden");
  }
};

// 随机模式开始
document.getElementById("nce-start-random").onclick = ()=>{
  const count = Number(document.getElementById("nce-random-count").value);
  const allSentences = [];
  nceDB.forEach(lesson=>{
    lesson.sentences.forEach(s=>{
      allSentences.push({
        ...s,
        lessonId: lesson.id,
        lessonTitle: lesson.title
      });
    });
  });
  if(count > allSentences.length){
    alert(`全范围共 ${allSentences.length} 个句子，出题数量不能超过总数`);
    return;
  }
  const shuffled = allSentences.sort(()=>Math.random()-0.5);
  startNceQuiz(shuffled.slice(0, count));
};

// 指定课文模式开始
document.getElementById("nce-start-lesson").onclick = ()=>{
  const lessonId = Number(document.getElementById("nce-lesson-select").value);
  const count = Number(document.getElementById("nce-lesson-count").value);
  const lesson = nceDB.find(l=>l.id === lessonId);
  if(count > lesson.sentences.length){
    alert(`本课共 ${lesson.sentences.length} 个句子，出题数量不能超过总数`);
    return;
  }
  const list = lesson.sentences.map(s=>({
    ...s,
    lessonId: lesson.id,
    lessonTitle: lesson.title
  }));
  startNceQuiz(list.slice(0, count));
};

// 自选句子模式：加载句子列表
document.getElementById("nce-load-sentences").onclick = ()=>{
  const lessonId = Number(document.getElementById("nce-select-lesson").value);
  const lesson = nceDB.find(l=>l.id === lessonId);
  const listEl = document.getElementById("nce-sentence-list");
  listEl.innerHTML = "";
  lesson.sentences.forEach((s, idx)=>{
    const div = document.createElement("div");
    div.className = "nce-sentence-item";
    div.innerHTML = `
      <input type="checkbox" class="nce-sentence-check" value="${idx}">
      <div class="sentence-text">
        <div class="en">${s.en}</div>
        <div class="cn">${s.cn}</div>
      </div>
    `;
    listEl.appendChild(div);
  });
  listEl.classList.remove("hidden");
  document.getElementById("nce-start-select").disabled = true;

  document.querySelectorAll(".nce-sentence-check").forEach(cb=>{
    cb.addEventListener("change", updateSelectStartBtn);
  });
};

function updateSelectStartBtn(){
  const checked = document.querySelectorAll(".nce-sentence-check:checked").length;
  document.getElementById("nce-start-select").disabled = checked === 0;
}

// 清空勾选
document.getElementById("nce-clear-select").onclick = ()=>{
  document.querySelectorAll(".nce-sentence-check").forEach(cb=>cb.checked = false);
  updateSelectStartBtn();
};

// 自选句子开始答题（点击后隐藏句子列表）
document.getElementById("nce-start-select").onclick = ()=>{
  const lessonId = Number(document.getElementById("nce-select-lesson").value);
  const lesson = nceDB.find(l=>l.id === lessonId);
  const checkedIndexes = Array.from(document.querySelectorAll(".nce-sentence-check:checked")).map(cb=>Number(cb.value));
  const list = checkedIndexes.map(idx=>({
    ...lesson.sentences[idx],
    lessonId: lesson.id,
    lessonTitle: lesson.title
  }));
  document.getElementById("nce-sentence-list").classList.add("hidden");
  startNceQuiz(list);
};

// 回车快捷批改
document.getElementById("nce-answer-input").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    if(!document.getElementById("nce-check-btn").disabled){
      document.getElementById("nce-check-btn").click();
    }else if(!document.getElementById("nce-next-btn").disabled){
      document.getElementById("nce-next-btn").click();
    }
  }
});

</script>
</body>
</html>
